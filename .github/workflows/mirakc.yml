name: mirakc


on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - 'mirakc/**'  
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '29 16 * * *'


jobs:
  docker:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["registry-1.docker.io", "mirror.gcr.io", "public.ecr.aws/docker"]

      - name: Prune build cache
        run: |
          docker buildx prune --all --force --verbose

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Prune build cache
        run: |
          docker buildx prune --all --force --verbose

      - name: Build and push mirakc
        uses: docker/build-push-action@v6
        with:
          context: ./mirakc/build/
          platforms: linux/amd64
          push: true
          tags: ghcr.io/stu2005/mirakc:latest
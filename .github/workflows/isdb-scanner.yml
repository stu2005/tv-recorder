name: isdb-scanner

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - 'scan/isdb-scanner/**'  
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '29 16 * * *'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["registry-1.docker.io", "mirror.gcr.io", "public.ecr.aws/docker"]
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.GH_TOKEN }}
      - name: Prune build cache
        run: |
          docker buildx prune --all --force --verbose
      - name: Build and push isdb-scanner
        uses: docker/build-push-action@v7
        with:
          context: ./scan/isdb-scanner/build/
          platforms: linux/amd64
          push: true
          tags: ghcr.io/stu2005/isdb-scanner:latest
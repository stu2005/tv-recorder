services:
  mirakurun:
    image: ghcr.io/stu2005/mirakurun:latest
    container_name: mirakurun
    devices:
      - /dev/px4video0
      - /dev/px4video1
      - /dev/px4video2
      - /dev/px4video3
      - /dev/pxm1urvideo0  
    volumes:
      - type: volume
        source: mirakurun
        target: /var/run/
      - type: bind
        source: ./mirakurun/config/
        target: /app-config/
      - type: volume
        source: mirakurun
        target: /app-data/
    ports:
      - published: 40772
        target: 40772
    cap_add:
      - SYS_ADMIN
      - SYS_NICE
    device_cgroup_rules:
      - 'c *:* rmw'
    tmpfs:
      - /tmp
    restart: always
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: "5m"
        compress: "true"

  mariadb:
    image: library/mariadb:latest
    container_name: mariadb
    volumes:
      - type: volume
        source: mariadb
        target: /var/lib/mysql
    environment:
      MYSQL_USER: epgstation
      MYSQL_PASSWORD: epgstation
      MYSQL_ROOT_PASSWORD: epgstation
      MYSQL_DATABASE: epgstation
      TZ: "Asia/Tokyo"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --performance-schema=false --expire_logs_days=1 # for mariadb
    restart: always
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: "5m"
        compress: "true"

  epgstation:
    image: ghcr.io/stu2005/epgstation:latest
    container_name: epgstation
    volumes:
      - type: bind
        source: ./epgstation/config/
        target: /app/config/
      - type: volume
        source: epgstation
        target: /app/data/
      - type: volume
        source: epgstation
        target: /app/thumbnail/
      - type: volume
        source: epgstation
        target: /app/logs/
      - type: bind
        source: /mnt/hdd/recorded/
        target: /app/recorded/
    environment:
      TZ: "Asia/Tokyo"
    depends_on:
      - mirakurun
      - mariadb
    ports:
      - published: 8888
        target: 8888
      - published: 8889
        target: 8889
    devices:
      - /dev/dri:/dev/dri
    restart: always
    logging:
      driver: json-file
      options:
        max-file: "2"
        max-size: "5m"
        compress: "true"

  tvchannels-scan:
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
    init: true
    restart: "no"
    network_mode: "none"
    devices:
      - "/dev/px4video0:/dev/px4video0"
      - "/dev/px4video2:/dev/px4video2"
    container_name: tvchannels-scan
    image: ghcr.io/stu2005/tvchannels-scan:latest
    volumes:
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      - type: bind
        source: ./scan/tvchannels-scan/
        target: /opt/tvchannels-scan/

  isdb-scanner:
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
    init: true
    restart: "no"
    network_mode: "none"
    devices:
      - "/dev/px4video0:/dev/px4video0"
      - "/dev/px4video1:/dev/px4video1"
      - "/dev/px4video2:/dev/px4video2"
      - "/dev/px4video3:/dev/px4video3"
      - "/dev/pxm1urvideo0:/dev/pxm1urvideo0"
    container_name: isdb-scanner 
    image: ghcr.io/stu2005/isdb-scanner:latest
    volumes:
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
      - type: bind
        source: ./scan/isdb-scanner/
        target: /app/scanned/

volumes:
  mirakurun:
    name: mirakurun
    driver: local
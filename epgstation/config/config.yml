              --disable-opencl
              --codec h264 
              --vbr 6000
              --max-bitrate 9000
              --vbv-bufsize 12000
              --gop-len 60
              --strict-gop
              --repeat-headers
              --aud
              --quality balanced 
              --profile high 
              --dar 16:9
              --interlace tff 
              --vpp-deinterlace bob 
              --output-res 1920x1080
              --audio-codec aac:aac_coder=twoloop 
              --audio-bitrate 256 
              --audio-samplerate 48000 

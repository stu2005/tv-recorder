port: 8888
mirakurunPath: http://mirakurun:40772/

kodiHosts:
  - name: Fire TV Stick HD
    host: http://192.168.1.101:8090

# dbtype: sqlite
# sqlite:
#   extensions:
#     - '/hoge/regexp.dylib'
#   regexp: true

dbtype: mysql
mysql:
  host: mariadb
  port: 3306
  user: epgstation
  password: epgstation
  database: epgstation
  charset: utf8mb4

epgUpdateIntervalTime: 10

conflictPriority: 1
recPriority: 2

streamFilePath: /app/recorded/tmp/

recordedFormat: '%TITLE%-%SHORTYEAR%年%MONTH%月%DAY%日%HOUR%時%MIN%分'
recordedFileExtension: .ts
recorded:
  - name: recorded
    path: '%ROOT%/recorded'
    limitThreshold: 100000
    action: remove
      
thumbnail: '%ROOT%/thumbnail'
thumbnailSize: 480x270
thumbnailPosition: 5
thumbnailCmd: '/usr/local/bin/ffmpeg -ss %THUMBNAIL_POSITION% -y -i %INPUT% -vframes 1 -f image2 -s %THUMBNAIL_SIZE% %OUTPUT%'

ffmpeg: /usr/bin/qsvencc
ffprobe: /usr/local/bin/ffprobe

encodeProcessNum: 4
concurrentEncodeNum: 1
encode:
  - name: '通常'
    cmd: '%NODE% %ROOT%/config/enc.js'
    suffix: .mp4
    rate: 4.0
  - name: 'CMカット'
    cmd: '%NODE% %ROOT%/config/jlse.js'
    suffix: .mp4
    rate: 4.0

urlscheme:
  m2ts:
    ios: vlc-x-callback://x-callback-url/stream?url=PROTOCOL%3A%2F%2FADDRESS
    android: intent://ADDRESS#Intent;action=android.intent.action.VIEW;type=video/*;scheme=PROTOCOL;end
  video:
    ios: infuse://x-callback-url/play?url=PROTOCOL://ADDRESS
    android: intent://ADDRESS#Intent;action=android.intent.action.VIEW;type=video/*;scheme=PROTOCOL;end
  download:
    ios: vlc-x-callback://x-callback-url/download?url=PROTOCOL%3A%2F%2FADDRESS&filename=FILENAME

stream:

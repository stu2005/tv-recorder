    ts:
      m2ts:
        - name: 無変換
        - name: 1080p
          cmd:
            '%FFMPEG% 
              --input-format mpegts 
              --input-probesize 1000K
              --input-analyze 0.7 
              --input - 
              --avhw
              --audio-stream FL 
              --data-copy timed_id3
              --sub-copy 
